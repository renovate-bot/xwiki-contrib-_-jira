rendering.macro.jiraPieChart.description=Zeigt ein Kreisdiagramm basierend auf der durchgeführten Abfrage an.
rendering.macro.jiraPieChart.parameter.url.name=URL
rendering.macro.jiraPieChart.parameter.url.description=Die URL des JIRA-Servers.
rendering.macro.jiraPieChart.parameter.id.name=Instanz-ID
rendering.macro.jiraPieChart.parameter.id.description=Die Konfigurations-ID der zu verwendenden JIRA-Server-URL.
rendering.macro.jiraPieChart.parameter.query.name=JQL-Abfrage
rendering.macro.jiraPieChart.parameter.query.description=Die JQL-Abfrage zum Abrufen von Issues.
rendering.macro.jiraPieChart.parameter.filterId.name=Filter-ID
rendering.macro.jiraPieChart.parameter.filterId.description=Die Kennung des gespeicherten JIRA-Filters, der für die Abfrage verwendet werden soll.
rendering.macro.jiraPieChart.parameter.type.name=Typ
rendering.macro.jiraPieChart.parameter.type.description=Der Typ der im Kreisdiagramm anzuzeigenden Statistiken.
rendering.macro.jiraPieChart.parameter.maxData.name=Datenumfang
rendering.macro.jiraPieChart.parameter.maxData.description=Die maximale Anzahl der im Kreisdiagramm anzuzeigenden Daten: Liegen mehr Daten vor, werden diese aggregiert dargestellt.
rendering.macro.jiraPieChart.labels.otherData=Sonstige Daten
