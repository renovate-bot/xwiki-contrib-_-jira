rendering.macro.jiraBiDimensionalGridChart.name=jiraBiDimensionalGridChart
rendering.macro.jiraBiDimensionalGridChart.description=Zeigt eine zweidimensionale Tabelle mit JIRA-Issue-Statistiken basierend auf den ausgewählten Feldern der x- und y-Achse an.
rendering.macro.jiraBiDimensionalGridChart.parameter.url.name=URL
rendering.macro.jiraBiDimensionalGridChart.parameter.url.description=Die URL des JIRA-Servers.
rendering.macro.jiraBiDimensionalGridChart.parameter.id.name=Instanz-ID
rendering.macro.jiraBiDimensionalGridChart.parameter.id.description=Die Konfigurations-ID der zu verwendenden JIRA-Server-URL.
rendering.macro.jiraBiDimensionalGridChart.parameter.query.name=JQL-Abfrage
rendering.macro.jiraBiDimensionalGridChart.parameter.query.description=Die JQL-Abfrage zum Abrufen von Issues.
rendering.macro.jiraBiDimensionalGridChart.parameter.filterId.name=Filter-ID
rendering.macro.jiraBiDimensionalGridChart.parameter.filterId.description=Die Kennung des gespeicherten JIRA-Filters, der für die Abfrage verwendet werden soll.
rendering.macro.jiraBiDimensionalGridChart.parameter.xAxisField.name=X-Achsenfeld
rendering.macro.jiraBiDimensionalGridChart.parameter.xAxisField.description=Die Feldinformationen, die in jeder Spalte angezeigt werden sollen.
rendering.macro.jiraBiDimensionalGridChart.parameter.yAxisField.name=Y-Achsenfeld
rendering.macro.jiraBiDimensionalGridChart.parameter.yAxisField.description=Die Feldinformationen, die in jeder Zeile angezeigt werden sollen.
rendering.macro.jiraBiDimensionalGridChart.parameter.numberOfResults.name=Anzahl der Ergebnisse
rendering.macro.jiraBiDimensionalGridChart.parameter.numberOfResults.description=Die Anzahl der zurückzugebenden Ergebnisse.
rendering.macro.jiraBiDimensionalGridChart.parameter.isSortAscending.name=Aufsteigend sortieren
rendering.macro.jiraBiDimensionalGridChart.parameter.isSortAscending.description=Aktivieren Sie diese Option, wenn die Sortierung aufsteigend erfolgen soll; andernfalls erfolgt sie absteigend.
rendering.macro.jiraBiDimensionalGridChart.parameter.isSortNatural.name=Nach natürlicher Reihenfolge sortieren
rendering.macro.jiraBiDimensionalGridChart.parameter.isSortNatural.description=Aktivieren Sie diese Option, um nach der natürlichen Feldreihenfolge zu sortieren; andernfalls erfolgt die Sortierung anhand der Summen.
rendering.macro.jiraCreatedVsResolvedChart.name=jiraCreatedVsResolvedChart
rendering.macro.jiraCreatedVsResolvedChart.description=Zeigt ein Liniendiagramm an, das die erstellten im Vergleich zu den gelösten Issues basierend auf der durchgeführten Abfrage darstellt.
rendering.macro.jiraCreatedVsResolvedChart.parameter.url.name=URL
rendering.macro.jiraCreatedVsResolvedChart.parameter.url.description=Die URL des JIRA-Servers.
rendering.macro.jiraCreatedVsResolvedChart.parameter.id.name=Instanz-ID
rendering.macro.jiraCreatedVsResolvedChart.parameter.id.description=Die Konfigurations-ID der zu verwendenden JIRA-Server-URL.
rendering.macro.jiraCreatedVsResolvedChart.parameter.query.name=JQL-Abfrage
rendering.macro.jiraCreatedVsResolvedChart.parameter.query.description=Die JQL-Abfrage zum Abrufen von Issues.
rendering.macro.jiraCreatedVsResolvedChart.parameter.filterId.name=Filter-ID
rendering.macro.jiraCreatedVsResolvedChart.parameter.filterId.description=Die Kennung des gespeicherten JIRA-Filters, der für die Abfrage verwendet werden soll.
rendering.macro.jiraCreatedVsResolvedChart.parameter.period.name=Zeitraum
rendering.macro.jiraCreatedVsResolvedChart.parameter.period.description=Der Zeitraum, der für die einzelnen Daten im Diagramm verwendet werden soll.
rendering.macro.jiraCreatedVsResolvedChart.parameter.daysPreviously.name=Tage zuvor
rendering.macro.jiraCreatedVsResolvedChart.parameter.daysPreviously.description=Die Anzahl der Tage in der Vergangenheit, die für die Datenerfassung herangezogen werden sollen.
rendering.macro.jiraCreatedVsResolvedChart.parameter.isCount.name=Zählen oder kumulieren?
rendering.macro.jiraCreatedVsResolvedChart.parameter.isCount.description=Aktivieren Sie diese Option, wenn die Daten einmal gezählt werden sollen; deaktivieren Sie sie, um die Werte zu kumulieren.
rendering.macro.jiraCreatedVsResolvedChart.parameter.displayTrend.name=Trend anzeigen
rendering.macro.jiraCreatedVsResolvedChart.parameter.displayTrend.description=Aktivieren Sie diese Option, wenn ein Diagramm mit Trend angezeigt werden soll.
rendering.macro.jiraCreatedVsResolvedChart.parameter.displayVersion.name=Version anzeigen
rendering.macro.jiraCreatedVsResolvedChart.parameter.displayVersion.description=Die Art der Versionen, die im Diagramm angezeigt werden sollen.
rendering.macro.jiraCreatedVsResolvedChart.labels.created=Erstellt
rendering.macro.jiraCreatedVsResolvedChart.labels.resolved=Gelöst
rendering.macro.jiraCreatedVsResolvedChart.labels.trend=Trend
